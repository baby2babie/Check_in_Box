<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>กล่องสุ่มรางวัล</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main-container">
  <div class="header">
    <div class="header-title">🎁 กล่องสุ่มรางวัล</div>
    <div class="header-sub">สะสมจากการเช็คอินติดต่อกัน</div>
    <div class="header-room" id="lb-room-label">กำลังโหลด...</div>
  </div>
  <div class="count-wrap">
    <div class="count-badge">
      🎁 กล่องที่มี: <span id="lb-count">0</span> ใบ
    </div>
  </div>
  <div class="lb-grid" id="lb-grid">
    <div class="loading">กำลังโหลด...</div>
  </div>
  <div class="safe-bottom"></div>
</div>

<!-- Popup -->
<div class="lb-overlay" id="lb-overlay">
  <div class="lb-popup" id="lb-popup">

    <!-- Floor glow decoration -->
    <div class="popup-floor-glow"></div>

    <!-- PHASE 1: SPINNING -->
    <div id="lb-spin-state">
      <div class="spin-energy-ring"></div>
      <div class="lb-spin-wrap" id="lb-spin-wrap">
        <div class="lb-spin-ring"></div>
        <div class="spin-ring-inner"></div>
        <div class="lb-spin-icon" id="lb-spin-icon">🎁</div>
        <!-- sparks injected by JS -->
      </div>
      <div class="lb-popup-title" id="lb-popup-title">กำลังเปิดกล่อง...</div>
      <div class="lb-popup-sub">รอสักครู่นะครับ ✨</div>
      <div class="spin-dots">
        <div class="spin-dot"></div>
        <div class="spin-dot"></div>
        <div class="spin-dot"></div>
      </div>
    </div>

    <!-- PHASE 2: RESULT -->
    <div class="lb-result" id="lb-result-state">
      <div class="lb-result-icon" id="lb-result-icon">🎉</div>
      <div class="lb-result-congrats">ยินดีด้วย! 🎉</div>
      <div class="lb-result-name" id="lb-result-name"></div>
      <div class="lb-result-amount-wrap">
        <div class="lb-result-amount" id="lb-result-amount">0</div>
      </div>
      <div class="lb-result-unit">บาท</div>
      <div class="lb-result-note">✨ ลดจากบิลเดือนนี้</div>
      <button class="lb-confirm-btn" onclick="closeLootPopup()">รับรางวัล 🎊</button>
    </div>

  </div>
</div>

<!-- Particle canvas -->
<canvas id="lb-particle-canvas"></canvas>

<!-- Confetti -->
<div class="lb-confetti" id="lb-confetti"></div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
