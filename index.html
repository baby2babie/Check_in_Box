<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo — กล่องสุ่มรางวัล</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0F;--surface:#17171A;--border:#2A2A30;
  --gold:#E9A84C;--teal:#38BFA1;--purple:#9B7EE8;--red:#E86060;
  --text:#F0EEE8;--muted:#7A7A8A;
}
html,body{height:100%;background:var(--bg);font-family:'Noto Sans Thai',sans-serif;color:var(--text);overflow:hidden}

/* ── STAGE ── */
.stage{height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px}
.stage-title{font-size:13px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.demo-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.demo-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:18px 16px;text-align:center;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  width:130px;transition:transform .2s;position:relative;overflow:hidden;
}
.demo-card:hover{transform:translateY(-4px) scale(1.03)}
.demo-card:active{transform:scale(.96)}
@keyframes glow-gold  {0%,100%{box-shadow:0 0 10px rgba(233,168,76,.1)}  50%{box-shadow:0 0 24px rgba(233,168,76,.55)}}
@keyframes glow-teal  {0%,100%{box-shadow:0 0 10px rgba(56,191,161,.1)}  50%{box-shadow:0 0 24px rgba(56,191,161,.55)}}
@keyframes glow-purple{0%,100%{box-shadow:0 0 10px rgba(155,126,232,.1)} 50%{box-shadow:0 0 24px rgba(155,126,232,.55)}}
@keyframes glow-red   {0%,100%{box-shadow:0 0 10px rgba(232,96,96,.1)}   50%{box-shadow:0 0 24px rgba(232,96,96,.55)}}
.card-gold  {border-color:rgba(233,168,76,.35); animation:glow-gold   2.5s infinite ease-in-out}
.card-teal  {border-color:rgba(56,191,161,.35); animation:glow-teal   2.5s infinite ease-in-out}
.card-purple{border-color:rgba(155,126,232,.35);animation:glow-purple 2.5s infinite ease-in-out}
.card-red   {border-color:rgba(232,96,96,.35);  animation:glow-red    2.5s infinite ease-in-out}
.card-icon{font-size:32px}
.card-name{font-size:13px;font-weight:700}
.card-ms{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
.ms-gold  {background:rgba(233,168,76,.12); color:var(--gold)}
.ms-teal  {background:rgba(56,191,161,.12); color:var(--teal)}
.ms-purple{background:rgba(155,126,232,.12);color:var(--purple)}
.ms-red   {background:rgba(232,96,96,.12);  color:var(--red)}
.hint{font-size:12px;color:var(--muted);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

/* ══════════════════════════════════════════
   OVERLAY — มืดเหมือนกันทุกกล่อง
══════════════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(4,4,6,.95);backdrop-filter:blur(14px);
  z-index:100;align-items:center;justify-content:center;
}
.overlay.show{display:flex}

/* ══════════════════════════════════════════
   POPUP
══════════════════════════════════════════ */
.popup{
  background:linear-gradient(160deg,#1c1c22 0%,#111114 60%,#181520 100%);
  border:1px solid rgba(255,255,255,.07);border-radius:28px;
  width:calc(100% - 40px);max-width:320px;
  padding:32px 24px 28px;text-align:center;position:relative;overflow:hidden;
  box-shadow:0 0 0 1px rgba(255,255,255,.04),0 24px 64px rgba(0,0,0,.9);
  animation:popIn .4s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes popIn{from{opacity:0;transform:scale(.8) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* floor glow ตาม tier */
.popup-floor{position:absolute;bottom:0;left:0;right:0;height:60px;pointer-events:none;border-radius:0 0 28px 28px;animation:floorPulse 2s ease infinite}
.popup-floor.tier-gold  {background:linear-gradient(to top,rgba(233,168,76,.07),transparent)}
.popup-floor.tier-teal  {background:linear-gradient(to top,rgba(56,191,161,.07),transparent)}
.popup-floor.tier-purple{background:linear-gradient(to top,rgba(155,126,232,.07),transparent)}
.popup-floor.tier-red   {background:linear-gradient(to top,rgba(232,96,96,.07),transparent)}
@keyframes floorPulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ══════════════════════════════════════════
   PHASE 1 — SPIN
   rings: หลายสีผสมกันแบบเดิม
══════════════════════════════════════════ */
.energy-ring{
  position:absolute;top:50%;left:50%;width:190px;height:190px;border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(233,168,76,.1) 0%,transparent 70%);
  animation:energyPulse 1.1s ease-in-out infinite;pointer-events:none;
}
@keyframes energyPulse{0%,100%{transform:translate(-50%,-50%) scale(.8);opacity:.3}50%{transform:translate(-50%,-50%) scale(1.5);opacity:.9}}

.spin-wrap{width:110px;height:110px;margin:0 auto 22px;position:relative}

.ring{position:absolute;border-radius:50%;border:2px solid transparent}
.ring-1{inset:0;   border-top-color:var(--gold);  border-right-color:rgba(233,168,76,.4); animation:spinCW .75s linear infinite; box-shadow:0 0 12px rgba(233,168,76,.4)}
.ring-2{inset:11px;border-bottom-color:var(--teal);border-left-color:rgba(56,191,161,.4);  animation:spinCCW 1.05s linear infinite;box-shadow:0 0 10px rgba(56,191,161,.3)}
.ring-3{inset:22px;border-top-color:var(--purple);                                         animation:spinCW 1.45s linear infinite; box-shadow:0 0 8px rgba(155,126,232,.3)}
.ring-4{inset:31px;border-right-color:var(--red);                                          animation:spinCCW .95s linear infinite; box-shadow:0 0 7px rgba(232,96,96,.25)}
.ring-5{inset:40px;border-top-color:rgba(255,215,0,.6);border-left-color:rgba(255,215,0,.3);animation:spinCW 1.25s linear infinite}
@keyframes spinCW {to{transform:rotate(360deg)}}
@keyframes spinCCW{to{transform:rotate(-360deg)}}

.spark{position:absolute;width:5px;height:5px;border-radius:50%;top:50%;left:50%;margin:-2.5px;animation:sparkOrbit linear infinite}
@keyframes sparkOrbit{
  from{transform:rotate(var(--a)) translateX(58px) scale(1);opacity:1}
  to  {transform:rotate(calc(var(--a)+360deg)) translateX(58px) scale(.2);opacity:.2}
}

.box-icon{
  position:absolute;inset:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  background:radial-gradient(circle at 35% 35%,#1e1e24,#0e0e12);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 0 20px rgba(233,168,76,.15);
  animation:boxFloat 1.8s ease-in-out infinite alternate;
}
@keyframes boxFloat{from{transform:translateY(-3px)}to{transform:translateY(3px)}}

.spin-title{font-family:'Cinzel',serif;font-size:15px;letter-spacing:2px;color:var(--text);margin-bottom:6px}
.spin-sub{font-size:12px;color:var(--muted);animation:blink 2s infinite}
.spin-dots{display:flex;justify-content:center;gap:8px;margin-top:14px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:dotPulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,100%{transform:scale(.6);opacity:.3}50%{transform:scale(1.4);opacity:1;background:#fff}}

/* ══════════════════════════════════════════
   PHASE 2 — RESULT
══════════════════════════════════════════ */
.result{display:none}
.result.show{display:block;animation:resultReveal .6s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes resultReveal{from{opacity:0;transform:scale(.6) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}

.result-icon{
  margin-bottom:16px;display:flex;justify-content:center;
  animation:iconDrop .7s cubic-bezier(.34,1.56,.64,1) .1s both;
  position:relative;
}
@keyframes iconDrop{from{transform:scale(0) rotate(-25deg) translateY(-40px);opacity:0}to{transform:scale(1) rotate(0) translateY(0);opacity:1}}

/* ── ไอคอน ฿ สไตล์ 2C ── */
.baht-stage{
  width:100px;height:100px;
  display:flex;align-items:center;justify-content:center;position:relative;
}
/* pulse bg */
.baht-pulse{position:absolute;inset:0;border-radius:50%;animation:bahtPulse 1.8s ease-in-out infinite}
@keyframes bahtPulse{0%,100%{transform:scale(.8);opacity:.4}50%{transform:scale(1.5);opacity:1}}
.baht-stage.tier-gold   .baht-pulse{background:radial-gradient(circle,rgba(233,168,76,.2) 0%,transparent 70%)}
.baht-stage.tier-teal   .baht-pulse{background:radial-gradient(circle,rgba(56,191,161,.2) 0%,transparent 70%)}
.baht-stage.tier-purple .baht-pulse{background:radial-gradient(circle,rgba(155,126,232,.2) 0%,transparent 70%)}
.baht-stage.tier-red    .baht-pulse{background:radial-gradient(circle,rgba(232,96,96,.2) 0%,transparent 70%)}

/* ring ใน icon */
.baht-ring{position:absolute;inset:6px;border-radius:50%;border:1.5px solid transparent;animation:spinCW 3s linear infinite}
.baht-stage.tier-gold   .baht-ring{border-top-color:rgba(233,168,76,.8);border-right-color:rgba(255,215,0,.4)}
.baht-stage.tier-teal   .baht-ring{border-top-color:rgba(56,191,161,.8);border-right-color:rgba(167,243,220,.4)}
.baht-stage.tier-purple .baht-ring{border-top-color:rgba(155,126,232,.8);border-right-color:rgba(192,168,255,.4)}
.baht-stage.tier-red    .baht-ring{border-top-color:rgba(232,96,96,.8);border-right-color:rgba(255,160,160,.4)}

.baht-ring-2{position:absolute;inset:16px;border-radius:50%;border:1px solid transparent;animation:spinCCW 2s linear infinite}
.baht-stage.tier-gold   .baht-ring-2{border-bottom-color:rgba(233,168,76,.5);border-left-color:rgba(255,215,0,.2)}
.baht-stage.tier-teal   .baht-ring-2{border-bottom-color:rgba(56,191,161,.5);border-left-color:rgba(167,243,220,.2)}
.baht-stage.tier-purple .baht-ring-2{border-bottom-color:rgba(155,126,232,.5);border-left-color:rgba(192,168,255,.2)}
.baht-stage.tier-red    .baht-ring-2{border-bottom-color:rgba(232,96,96,.5);border-left-color:rgba(255,160,160,.2)}

/* ตัวอักษร ฿ */
.baht-text{
  font-size:54px;font-weight:900;font-family:'Cinzel',serif;
  position:relative;z-index:2;line-height:1;
}
.baht-stage.tier-gold   .baht-text{
  background:linear-gradient(160deg,#fffde7 0%,#FFD700 40%,#F59E0B 80%,#92400E 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px rgba(233,168,76,1)) drop-shadow(0 0 28px rgba(233,168,76,.5));
  animation:glowGold 2s ease-in-out infinite alternate;
}
.baht-stage.tier-teal   .baht-text{
  background:linear-gradient(160deg,#f0fdf4 0%,#6ee7b7 30%,#38BFA1 60%,#0d9488 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px rgba(56,191,161,1)) drop-shadow(0 0 28px rgba(56,191,161,.5));
  animation:glowTeal 2s ease-in-out infinite alternate;
}
.baht-stage.tier-purple .baht-text{
  background:linear-gradient(160deg,#faf5ff 0%,#d8b4fe 30%,#9B7EE8 60%,#6d28d9 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px rgba(155,126,232,1)) drop-shadow(0 0 28px rgba(155,126,232,.5));
  animation:glowPurple 2s ease-in-out infinite alternate;
}
.baht-stage.tier-red    .baht-text{
  background:linear-gradient(160deg,#fff1f2 0%,#fca5a5 30%,#E86060 60%,#b91c1c 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px rgba(232,96,96,1)) drop-shadow(0 0 28px rgba(232,96,96,.5));
  animation:glowRed 2s ease-in-out infinite alternate;
}
@keyframes glowGold  {from{filter:drop-shadow(0 0 8px rgba(233,168,76,.7))}  to{filter:drop-shadow(0 0 20px rgba(233,168,76,1)) drop-shadow(0 0 44px rgba(233,168,76,.5))}}
@keyframes glowTeal  {from{filter:drop-shadow(0 0 8px rgba(56,191,161,.7))}  to{filter:drop-shadow(0 0 20px rgba(56,191,161,1)) drop-shadow(0 0 44px rgba(56,191,161,.5))}}
@keyframes glowPurple{from{filter:drop-shadow(0 0 8px rgba(155,126,232,.7))} to{filter:drop-shadow(0 0 20px rgba(155,126,232,1)) drop-shadow(0 0 44px rgba(155,126,232,.5))}}
@keyframes glowRed   {from{filter:drop-shadow(0 0 8px rgba(232,96,96,.7))}   to{filter:drop-shadow(0 0 20px rgba(232,96,96,1)) drop-shadow(0 0 44px rgba(232,96,96,.5))}}

/* sparks รอบ ฿ */
.baht-spark{
  position:absolute;border-radius:50%;
  top:50%;left:50%;
  animation:sparkBurst linear infinite;
}
@keyframes sparkBurst{
  0%  {transform:rotate(var(--a)) translateX(var(--r)) scale(1);opacity:1}
  70% {opacity:.7}
  100%{transform:rotate(calc(var(--a)+360deg)) translateX(var(--r)) scale(.1);opacity:0}
}

/* ตัวเลขผลรางวัล สีตาม tier */
.result-congrats{font-family:'Cinzel',serif;font-size:18px;letter-spacing:1px;color:var(--text);margin-bottom:4px;animation:slam .5s cubic-bezier(.36,.07,.19,.97) .3s both}
@keyframes slam{0%{transform:scale(2.2);opacity:0}60%{transform:scale(.93)}80%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.result-prize{font-size:13px;color:var(--muted);margin-bottom:10px;animation:fadeUp .4s ease .5s both}
.result-amount-wrap{display:inline-block;margin:0 auto 2px;animation:amountPop .7s cubic-bezier(.34,1.56,.64,1) .55s both}
@keyframes amountPop{from{transform:scale(.3);opacity:0;filter:blur(10px)}to{transform:scale(1);opacity:1;filter:blur(0)}}
.result-amount{font-size:68px;font-weight:700;letter-spacing:-3px;line-height:1}
#phase-result.tier-gold   .result-amount{color:var(--gold);  text-shadow:0 0 30px rgba(233,168,76,.8),0 0 60px rgba(233,168,76,.3)}
#phase-result.tier-teal   .result-amount{color:var(--teal);  text-shadow:0 0 30px rgba(56,191,161,.8), 0 0 60px rgba(56,191,161,.3)}
#phase-result.tier-purple .result-amount{color:var(--purple);text-shadow:0 0 30px rgba(155,126,232,.8),0 0 60px rgba(155,126,232,.3)}
#phase-result.tier-red    .result-amount{color:var(--red);   text-shadow:0 0 30px rgba(232,96,96,.8),  0 0 60px rgba(232,96,96,.3)}
.result-unit{font-size:15px;color:var(--muted);margin-bottom:3px;animation:fadeUp .4s ease .8s both}
.result-note{font-size:13px;color:var(--muted);margin:0 0 22px;animation:fadeUp .4s ease .9s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ปุ่ม สีตาม tier */
.confirm-btn{
  width:100%;padding:15px;border:none;border-radius:14px;
  color:#0D0D0F;font-size:16px;font-weight:700;
  font-family:'Noto Sans Thai',sans-serif;cursor:pointer;
  animation:btnAppear .5s cubic-bezier(.34,1.56,.64,1) 1.1s both;
  transition:transform .15s,box-shadow .15s;
}
#phase-result.tier-gold   .confirm-btn{background:linear-gradient(135deg,#E9A84C,#d4922f);box-shadow:0 4px 20px rgba(233,168,76,.4)}
#phase-result.tier-teal   .confirm-btn{background:linear-gradient(135deg,#38BFA1,#2a9e86);box-shadow:0 4px 20px rgba(56,191,161,.4)}
#phase-result.tier-purple .confirm-btn{background:linear-gradient(135deg,#9B7EE8,#7c5cd4);box-shadow:0 4px 20px rgba(155,126,232,.4)}
#phase-result.tier-red    .confirm-btn{background:linear-gradient(135deg,#E86060,#d04444);box-shadow:0 4px 20px rgba(232,96,96,.4)}
@keyframes btnAppear{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.confirm-btn:hover{transform:translateY(-2px)}
.confirm-btn:active{transform:scale(.97)}

/* ── FX ── */
#fx-canvas{position:fixed;inset:0;pointer-events:none;z-index:99;display:none}
#fx-canvas.show{display:block}
.ring-burst{position:fixed;pointer-events:none;z-index:99;border-radius:50%;transform:translate(-50%,-50%) scale(0);animation:ringExpand .65s ease-out forwards}
@keyframes ringExpand{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(7);opacity:0}}
.screen-flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:200;animation:flashAnim .5s ease forwards}
@keyframes flashAnim{0%{opacity:0}15%{opacity:.35}100%{opacity:0}}
.result-star{position:fixed;pointer-events:none;z-index:120;animation:starFloat linear forwards}
@keyframes starFloat{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(-120px) rotate(400deg) scale(0);opacity:0}}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:110;display:none}
.confetti-wrap.show{display:block}
.c-dot{position:absolute;border-radius:2px;animation:cFall linear forwards}
@keyframes cFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div class="stage">
  <div class="stage-title">🎮 กดการ์ดเพื่อดู Demo</div>
  <div class="demo-cards">
    <div class="demo-card card-gold"   onclick="openBox(this,'tier-gold','กล่องเงิน',8)">
      <div class="card-icon">🎁</div><div class="card-name">กล่องเงิน</div>
      <div class="card-ms ms-gold">ส่วนลด 8 บาท</div>
    </div>
    <div class="demo-card card-teal"   onclick="openBox(this,'tier-teal','กล่องทอง',17)">
      <div class="card-icon">🎁</div><div class="card-name">กล่องทอง</div>
      <div class="card-ms ms-teal">ส่วนลด 17 บาท</div>
    </div>
    <div class="demo-card card-purple" onclick="openBox(this,'tier-purple','กล่องแพลตินัม',23)">
      <div class="card-icon">🎁</div><div class="card-name">กล่องแพลตินัม</div>
      <div class="card-ms ms-purple">ส่วนลด 23 บาท</div>
    </div>
    <div class="demo-card card-red"    onclick="openBox(this,'tier-red','กล่องตำนาน',45)">
      <div class="card-icon">🎁</div><div class="card-name">กล่องตำนาน</div>
      <div class="card-ms ms-red">ส่วนลด 45 บาท</div>
    </div>
  </div>
  <div class="hint">✨ กดทุกกล่องได้เพื่อดู animation ครับ</div>
</div>

<div class="overlay" id="overlay">
  <div class="popup" id="popup">
    <div class="popup-floor" id="popup-floor"></div>

    <!-- SPIN -->
    <div id="phase-spin">
      <div class="energy-ring"></div>
      <div class="spin-wrap" id="spin-wrap">
        <div class="ring ring-1"></div><div class="ring ring-2"></div>
        <div class="ring ring-3"></div><div class="ring ring-4"></div>
        <div class="ring ring-5"></div>
        <div class="box-icon">🎁</div>
      </div>
      <div class="spin-title" id="spin-title">OPENING...</div>
      <div class="spin-sub">รอสักครู่นะครับ ✨</div>
      <div class="spin-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <!-- RESULT -->
    <div class="result" id="phase-result">
      <div class="result-icon">
        <div class="baht-stage" id="baht-stage">
          <div class="baht-pulse"></div>
          <div class="baht-ring"></div>
          <div class="baht-ring-2"></div>
          <div class="baht-text">฿</div>
        </div>
      </div>
      <div class="result-congrats">ยินดีด้วย! 🎉</div>
      <div class="result-prize" id="result-prize"></div>
      <div class="result-amount-wrap">
        <div class="result-amount" id="result-amount">0</div>
      </div>
      <div class="result-unit">บาท</div>
      <div class="result-note">✨ ลดจากบิลเดือนนี้</div>
      <button class="confirm-btn" onclick="closePopup()">รับรางวัล 🎊</button>
    </div>
  </div>
</div>

<canvas id="fx-canvas"></canvas>
<div class="confetti-wrap" id="confetti"></div>

<script>
let opening=false, canvasAnim=null;

const TIER_COLS={
  'tier-gold':  ['#E9A84C','#FFD700','#FFF176','#fff','#F59E0B','#FDE68A'],
  'tier-teal':  ['#38BFA1','#6ee7b7','#a7f3d0','#fff','#0d9488','#34d399'],
  'tier-purple':['#9B7EE8','#c4b5fd','#ddd6fe','#fff','#7c3aed','#a78bfa'],
  'tier-red':   ['#E86060','#fca5a5','#fecaca','#fff','#b91c1c','#f87171'],
};
const TIERS=['tier-gold','tier-teal','tier-purple','tier-red'];

function openBox(card,tier,name,amount){
  if(opening)return; opening=true;

  // ring burst
  const rc=card.getBoundingClientRect();
  const col=TIER_COLS[tier][0];
  const b=document.createElement('div'); b.className='ring-burst';
  b.style.cssText=`left:${rc.left+rc.width/2}px;top:${rc.top+rc.height/2}px;width:60px;height:60px;border-color:${col}`;
  document.body.appendChild(b); setTimeout(()=>b.remove(),700);

  // apply tier classes
  const els={
    popup:   document.getElementById('popup'),
    floor:   document.getElementById('popup-floor'),
    result:  document.getElementById('phase-result'),
    stage:   document.getElementById('baht-stage'),
  };
  Object.values(els).forEach(el=>TIERS.forEach(t=>el.classList.remove(t)));
  Object.values(els).forEach(el=>el.classList.add(tier));

  // reset & show
  document.getElementById('phase-spin').style.display='block';
  document.getElementById('phase-result').classList.remove('show');
  document.getElementById('spin-title').textContent=name.toUpperCase();
  document.getElementById('overlay').classList.add('show');

  injectSparks(); startCanvas(tier);

  // escalate ring speed
  const rings=document.querySelectorAll('.ring');
  let step=0;
  const iv=setInterval(()=>{
    step++;
    [.75,1.05,1.45,.95,1.25].forEach((s,i)=>{
      rings[i].style.animationDuration=Math.max(.12,s-step*.12)+'s';
    });
    if(step>=5)clearInterval(iv);
  },300);

  setTimeout(()=>{
    clearInterval(iv);
    stopCanvas();
    // screen flash
    const f=document.createElement('div'); f.className='screen-flash';
    document.body.appendChild(f); setTimeout(()=>f.remove(),600);

    setTimeout(()=>{
      rings.forEach(r=>r.style.animationDuration='');
      document.getElementById('phase-spin').style.display='none';
      document.getElementById('result-prize').textContent=name;
      document.getElementById('result-amount').textContent='0';
      document.getElementById('phase-result').classList.add('show');
      injectBahtSparks(tier);
      setTimeout(()=>countUp('result-amount',amount,900),600);
      setTimeout(()=>spawnStars(tier),700);
      setTimeout(()=>spawnConfetti(tier),900);
      opening=false;
    },180);
  },2300);
}

function closePopup(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('confetti').classList.remove('show');
  document.getElementById('confetti').innerHTML='';
  stopCanvas(); opening=false;
}

function injectSparks(){
  const wrap=document.getElementById('spin-wrap');
  wrap.querySelectorAll('.spark').forEach(s=>s.remove());
  const cols=['#E9A84C','#38BFA1','#fff','#9B7EE8','#FFD700','#E86060','#a7f3d0','#ddd6fe'];
  for(let i=0;i<8;i++){
    const s=document.createElement('div'); s.className='spark';
    s.style.setProperty('--a',(360/8*i)+'deg');
    s.style.background=cols[i]; s.style.boxShadow=`0 0 6px 2px ${cols[i]}`;
    s.style.animationDuration=(1.1+Math.random()*.7)+'s';
    s.style.animationDelay=-(Math.random()*1.5)+'s';
    wrap.appendChild(s);
  }
}

function injectBahtSparks(tier){
  const stage=document.getElementById('baht-stage');
  stage.querySelectorAll('.baht-spark').forEach(s=>s.remove());
  const cols=TIER_COLS[tier];
  for(let i=0;i<10;i++){
    const s=document.createElement('div'); s.className='baht-spark';
    const sz=3+Math.random()*4;
    s.style.cssText=`width:${sz}px;height:${sz}px;margin-left:${-sz/2}px;margin-top:${-sz/2}px`;
    s.style.setProperty('--a',(36*i)+'deg');
    s.style.setProperty('--r',(44+Math.random()*10)+'px');
    s.style.background=cols[i%cols.length];
    s.style.boxShadow=`0 0 5px 2px ${cols[i%cols.length]}`;
    s.style.animationDuration=(1.6+Math.random()*.8)+'s';
    s.style.animationDelay=-(Math.random()*2)+'s';
    stage.appendChild(s);
  }
}

function startCanvas(tier){
  const cv=document.getElementById('fx-canvas');
  const ctx=cv.getContext('2d');
  cv.width=innerWidth; cv.height=innerHeight; cv.classList.add('show');
  const cx=cv.width/2, cy=cv.height/2;
  const COLS=TIER_COLS[tier];
  const pts=Array.from({length:100},(_,i)=>{
    const a=Math.PI*2*i/100+(Math.random()-.5)*.4, spd=3+Math.random()*9;
    return{x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,
      color:COLS[i%COLS.length],size:2+Math.random()*5,
      life:1,decay:.011+Math.random()*.014,grav:.14+Math.random()*.1,
      rot:Math.random()*Math.PI*2,rotS:(Math.random()-.5)*.3,rect:Math.random()>.5};
  });
  const orbs=Array.from({length:14},(_,i)=>({
    angle:Math.PI*2*i/14,r:55+Math.random()*35,spd:.05+Math.random()*.04,
    color:COLS[i%COLS.length],size:2+Math.random()*3
  }));
  let frame=0;
  function tick(){
    ctx.clearRect(0,0,cv.width,cv.height); frame++;
    if(frame<140) orbs.forEach(o=>{
      o.angle+=o.spd;
      const ox=cx+Math.cos(o.angle)*o.r, oy=cy+Math.sin(o.angle)*o.r;
      ctx.save(); ctx.globalAlpha=(1-frame/140)*.85;
      ctx.fillStyle=ctx.shadowColor=o.color; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(ox,oy,o.size,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
    let alive=false;
    pts.forEach(p=>{
      if(p.life<=0)return; alive=true;
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.grav; p.vx*=.99;
      p.life-=p.decay; p.rot+=p.rotS;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=ctx.shadowColor=p.color; ctx.shadowBlur=7;
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      if(p.rect)ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*2);
      else{ctx.beginPath();ctx.arc(0,0,p.size,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    if(alive||frame<140) canvasAnim=requestAnimationFrame(tick);
    else cv.classList.remove('show');
  }
  canvasAnim=requestAnimationFrame(tick);
}
function stopCanvas(){
  if(canvasAnim){cancelAnimationFrame(canvasAnim);canvasAnim=null;}
  const cv=document.getElementById('fx-canvas');
  cv.getContext('2d').clearRect(0,0,cv.width,cv.height); cv.classList.remove('show');
}

function countUp(id,target,dur){
  const el=document.getElementById(id), t0=performance.now();
  (function step(now){
    const t=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-t,4);
    el.textContent=Math.round(e*target);
    if(t<1)requestAnimationFrame(step); else el.textContent=target;
  })(t0);
}

function spawnStars(tier){
  const popup=document.getElementById('popup');
  const rc=popup.getBoundingClientRect();
  const cx=rc.left+rc.width/2, cy=rc.top+rc.height/2;
  const icons=['⭐','✨','💫','🌟','🎊','🎉','💎','🔥'];
  for(let i=0;i<16;i++){
    const s=document.createElement('div'); s.className='result-star';
    s.textContent=icons[Math.floor(Math.random()*icons.length)];
    const angle=Math.PI*2*i/16, dist=50+Math.random()*80;
    s.style.left=(cx+Math.cos(angle)*dist*.35)+'px';
    s.style.top=(cy+Math.sin(angle)*dist*.35)+'px';
    s.style.fontSize=(11+Math.random()*14)+'px';
    s.style.animationDuration=(.7+Math.random()*.8)+'s';
    s.style.animationDelay=(i*.04)+'s';
    document.body.appendChild(s); setTimeout(()=>s.remove(),2000);
  }
}

function spawnConfetti(tier){
  const w=document.getElementById('confetti');
  const COLS=TIER_COLS[tier];
  w.innerHTML=''; w.classList.add('show');
  for(let i=0;i<90;i++){
    const d=document.createElement('div'); d.className='c-dot';
    d.style.left=Math.random()*100+'vw';
    d.style.background=COLS[Math.floor(Math.random()*COLS.length)];
    d.style.animationDuration=(Math.random()*2+1.4)+'s';
    d.style.animationDelay=(Math.random()*.9)+'s';
    d.style.width=(Math.random()*10+3)+'px';
    d.style.height=(Math.random()*10+3)+'px';
    d.style.borderRadius=Math.random()>.5?'50%':'2px';
    d.style.boxShadow=`0 0 6px ${COLS[Math.floor(Math.random()*COLS.length)]}`;
    w.appendChild(d);
  }
  setTimeout(()=>w.classList.remove('show'),5000);
}
</script>
